name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: easycode
          POSTGRES_USER: easycode
          POSTGRES_PASSWORD: easycode
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U easycode -d easycode"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Check generated protocol contracts
        run: pnpm contracts:check

      - name: Test
        run: pnpm test

      - name: Test PostgreSQL store and Redis fanout
        env:
          EASYCODE_POSTGRES_URL: postgres://easycode:easycode@localhost:5432/easycode
          EASYCODE_POSTGRES_TEST_URL: postgres://easycode:easycode@localhost:5432/easycode
          EASYCODE_REDIS_TEST_URL: redis://localhost:6379
        run: |
          pnpm --filter @easycode/relay-server migrate:postgres
          pnpm --filter @easycode/relay-server test

      - name: Build
        run: pnpm build

      - name: Validate Docker Compose
        run: docker compose config

      - name: E2E smoke test
        run: pnpm test:e2e
